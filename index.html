<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise For You! 💖</title>
    <style>
        :root {
            --primary-color: #ff477e;
            --bg-gradient: linear-gradient(135deg, #fed6e3 0%, #a8c1ef 100%);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
            width: 100%;
        }
        .card.active { 
            display: block; 
        }

        /* Buttons */
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.3);
            width: 100%;
        }
        .btn:hover { transform: scale(1.02); background: #e03e6f; }

        /* Envelope Styling */
        .envelope-wrapper {
            position: relative;
            width: 200px;
            height: 150px;
            background: #ff6b8b;
            margin: 30px auto;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .envelope-wrapper:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 85px solid #ff477e;
            transform-origin: top;
            transition: transform 0.4s ease-in-out;
            z-index: 2;
        }
        .envelope-wrapper.open:before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* Slider Styling */
        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: 15px 0;
            width: 100%;
        }
        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 100%;
        }
        .slide {
            min-width: 100%;
            width: 100%;
        }
        .slide img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 15px;
            display: block;
        }

        /* Video Container */
        video {
            width: 100%;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            background-color: black;
        }

        /* Fullscreen styling fixes */
        video:-webkit-full-screen { width: 100% !important; height: 100% !important; }
        video:fullscreen { width: 100% !important; height: 100% !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card active" id="screen-note1">
        <h2>Hey! ✨</h2>
        <p>You know something?? </p>
        <button class="btn" onclick="nextScreen('screen-note1', 'screen-note2')">Next 👉</button>
    </div>

    <div class="card" id="screen-note2">
        <h2>But wait... 🤔</h2>
        <p>Aaj to tera Birthday hai be... 👺</po>
        <button class="btn" onclick="nextScreen('screen-note2', 'screen-envelope')">Next 👉</button>
    </div>

    <div class="card" id="screen-envelope">
        <h2>You got a chithii ✉️</h2>
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()"></div>
        <p style="font-weight: bold; color: #ff477e; margin-top: 20px;">Click the envelope to open!</p>
    </div>

    <div class="card" id="screen-slider">
        <h3>Teri hidden Shakal 🌝📸</h3>
        <div class="slider-container">
            <div class="slides" id="slides">
                <div class="slide"><img src="photo1.jpg" alt="Memory 1"></div>
                <div class="slide"><img src="photo2.jpg" alt="Memory 2"></div>
                <div class="slide"><img src="photo3.jpg" alt="Memory 3"></div>
                <div class="slide"><img src="photo4.jpg" alt="Memory 4"></div>
                <div class="slide"><img src="photo5.jpg" alt="Memory 5"></div>
            </div>
        </div>
        <p id="slide-count" style="font-weight: bold; color: #ff477e;">1 / 5</p>
        <button class="btn" id="slider-btn" onclick="nextSlide()">Aage Aage ➔</button>
    </div>

    <div class="card" id="screen-video">
        <h2>Well, kuch aur bhi hai 🎬</h2>
        <p>Shayad pasand aaye 🙌🏻</p>
        <video id="birthdayVideo" controls preload="auto" playsinline>
            <source src="edit.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

</div>

<script>
    // Navigation Logic
    function nextScreen(currentId, nextId) {
        document.getElementById(currentId).classList.remove('active');
        document.getElementById(nextId).classList.add('active');
    }

    // Envelope Logic
    function openEnvelope() {
        const env = document.getElementById('envelope');
        env.classList.add('open');
        setTimeout(() => {
            nextScreen('screen-envelope', 'screen-slider');
        }, 1000);
    }

    // Slider Logic
    let currentSlide = 0;
    const totalSlides = 5;

    function nextSlide() {
        currentSlide++;
        const slides = document.getElementById('slides');
        const sliderBtn = document.getElementById('slider-btn');
        const countText = document.getElementById('slide-count');

        if (currentSlide < totalSlides) {
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            countText.innerText = `${currentSlide + 1} / 5`;
            
            if (currentSlide === totalSlides - 1) {
                sliderBtn.innerText = "See the Final Surprise! 🎁";
            }
        } else {
            nextScreen('screen-slider', 'screen-video');
            const video = document.getElementById('birthdayVideo');
            
            // Fullscreen trigger with safety check
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) {
                video.msRequestFullscreen();
            }

            video.play().catch(error => {
                console.log("Autoplay blocked, user will play manually.");
            });
        }
    }
</script>

</body>
</html>
